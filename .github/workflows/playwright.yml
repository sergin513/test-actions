name : Github Playwright
run-name: ${{ github.actor }} is e2e testing on GitHub 🚀
on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install Playwright browsers + deps
        run: npx playwright install --with-deps
      
      - name: Build docker image
        run: docker build -t app .

      - name: Login to GHCR
        if: matrix.browser == 'chromium'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: matrix.browser == 'chromium'
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          docker tag app "$IMAGE_NAME"
          docker push "$IMAGE_NAME"

      - name: Run container
        run: docker run -d -p 3000:3000 app

      - name: Wait server
        run: |
          for i in {1..10}; do
            curl -s http://localhost:3000 && break
            sleep 1
          done
          
      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report
